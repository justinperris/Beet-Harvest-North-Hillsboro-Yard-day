<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dave's Field Report - Hillsboro North Yard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; font-size: 16px; }
        #drop-zone {
            border: 3px dashed #ccc; padding: 40px; text-align: center; margin: 15px 0; border-radius: 8px; cursor: pointer; background: #fafafa;
        }
        #drop-zone.dragover { background: #e0f0ff; border-color: #007bff; }
        .images { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .images img { max-width: 180px; max-height: 180px; border: 1px solid #ddd; border-radius: 4px; object-fit: cover; }
        
        /* Letter size preview (8.5 x 11) */
        #preview { 
            width: 8.5in; 
            max-width: 100%; 
            min-height: 11in; 
            margin: 20px auto; 
            padding: 0.75in; 
            background: white; 
            border: 1px solid #ddd; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
            font-size: 12pt;
            line-height: 1.4;
        }
        #preview h2 { margin-top: 0; font-size: 18pt; }
        
        button { padding: 12px 24px; margin: 8px 5px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
        .note { font-size: 0.9em; color: #666; margin-top: 5px; }
        
        /* Print styles for clean letter pages */
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; max-width: none; padding: 0; }
            #preview { 
                width: 8.5in; 
                height: 11in; 
                margin: 0; 
                padding: 0.75in; 
                box-shadow: none; 
                border: none; 
                page-break-inside: auto;
            }
            button, #drop-zone, .images { display: none !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dave's Field Report</h1>
        
        <label>Report Title (auto-dated):</label>
        <input type="text" id="title" placeholder="Field Report - Date">
        <div class="note">Auto-fills with today's date + day of the week.</div>
        
        <label>Your Report Text:</label>
        <textarea id="report-text" rows="10" placeholder="Type your detailed report here..."></textarea>
        
        <label>Drag &amp; Drop Photos Here (or click to select):</label>
        <div id="drop-zone">Drop images here<br><small>(JPG, PNG, etc. — multiple OK)</small></div>
        <input type="file" id="file-input" multiple accept="image/*" style="display:none;">
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">

        <div style="margin:10px 0;">
            <button onclick="document.getElementById('camera-input').click()">Take Photo</button>
            <button onclick="clearImages()">Clear Images</button>
        </div>
        
        <div class="images" id="image-preview"></div>
        
        <button onclick="generatePreview()">Update Preview</button>
        <button onclick="exportAsImage()">Export as Image (PNG)</button>
        <button onclick="exportAsPDF()">Download PDF</button>
        <button onclick="window.print()">Print</button>
        
        <div id="preview">
            <h2 id="preview-title" style="margin-top:0; text-align:center; font-size:22pt; font-weight:bold;">Hillsboro North Yard</h2>
            <div id="preview-report-label" style="text-align:center; font-size:14pt; font-weight:bold; margin-top:2px;">Dave's Report</div>
            <div id="preview-generated-by" style="text-align:center; font-size:8pt; font-weight:normal; color:#666; margin-top:2px;">Generated by Dave's Mobile App</div>
            <h3 id="preview-subtitle" style="text-align:center; margin-top:5px;"></h3>
            <div id="preview-text" style="margin-top:20px; white-space: pre-wrap;"></div>
            <div id="preview-images" style="margin-top:25px; display:flex; flex-direction:column; gap:15px;"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const cameraInput = document.getElementById('camera-input');
        const imagePreview = document.getElementById('image-preview');
        const previewTitle = document.getElementById('preview-title');
        const previewSubtitle = document.getElementById('preview-subtitle');
        const previewText = document.getElementById('preview-text');
        const previewImages = document.getElementById('preview-images');
        let uploadedImages = [];

        // Drag and drop + picker
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        cameraInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
            cameraInput.value = '';
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(files) {
            if (!files || files.length === 0) return;
            
            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        uploadedImages.push(e.target.result);
                        renderImages();
                        generatePreview();
                    };
                    reader.readAsDataURL(file);
                } else {
                    alert("Only image files are supported.");
                }
            });
        }

        function renderImages() {
            imagePreview.innerHTML = '';
            if (uploadedImages.length === 0) {
                imagePreview.innerHTML = '<p style="color:#999;">No images yet</p>';
                return;
            }
            uploadedImages.forEach((src) => {
                const img = document.createElement('img');
                img.src = src;
                imagePreview.appendChild(img);
            });
        }

        function clearImages() {
            uploadedImages = [];
            renderImages();
            generatePreview();
        }

        function generatePreview() {
            previewSubtitle.textContent = document.getElementById('title').value || "";
            previewText.innerHTML = document.getElementById('report-text').value.replace(/\n/g, '<br>');
            
            previewImages.innerHTML = '';
            if (uploadedImages.length === 0) {
                previewImages.innerHTML = '<p style="color:#999;">Add photos above to see them here</p>';
                return;
            }

            // Stacked layout (one per row) — bigger photos
            uploadedImages.forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                img.style.width = '100%';
                img.style.height = 'auto';
                img.style.border = '1px solid #ddd';
                previewImages.appendChild(img);
            });
        }

        function getFileNameStamp() {
            const now = new Date();
            const time = new Intl.DateTimeFormat('en-US', {
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            }).format(now).replace(':', '-').replace(' ', '');
            const dayName = new Intl.DateTimeFormat('en-US', { weekday: 'long' }).format(now);
            const dateStr = new Intl.DateTimeFormat('en-US', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            }).format(now).replace(/\//g, '-');
            return `${time} ${dayName} ${dateStr}`;
        }

        async function exportAsImage() {
            generatePreview();
            const previewEl = document.getElementById('preview');

            try {
                const canvas = await html2canvas(previewEl, {
                    scale: 3,
                    useCORS: true,
                    backgroundColor: '#ffffff'
                });
                const link = document.createElement('a');
                link.download = `${getFileNameStamp()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                alert("Image export failed. Use Print for best multi-page results.");
            }
        }

        const IMAGES_PER_PDF_PAGE = 2;

        function makePdfPageShell(widthPx) {
            // Reuses #preview's stylesheet rule (padding, font, background, border-color
            // base) via a shared id, while overriding sizing for capture off-screen.
            const el = document.createElement('div');
            el.id = 'preview';
            el.style.position = 'fixed';
            el.style.top = '0';
            el.style.left = '-9999px';
            el.style.margin = '0';
            el.style.minHeight = '0';
            el.style.height = 'auto';
            el.style.width = widthPx + 'px';
            el.style.maxWidth = 'none';
            el.style.boxSizing = 'border-box';
            el.style.boxShadow = 'none';
            el.style.border = '2px solid #333';
            return el;
        }

        function buildImagesRow(imagesBatch) {
            const container = document.createElement('div');
            container.style.display = 'flex';
            container.style.flexDirection = 'column';
            container.style.gap = '15px';
            imagesBatch.forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                img.style.width = '100%';
                img.style.height = 'auto';
                img.style.border = '1px solid #ddd';
                container.appendChild(img);
            });
            return container;
        }

        async function renderPageToCanvas(pageEl) {
            document.body.appendChild(pageEl);
            const canvas = await html2canvas(pageEl, {
                scale: 3,
                useCORS: true,
                backgroundColor: '#ffffff',
                windowWidth: pageEl.scrollWidth,
                windowHeight: pageEl.scrollHeight
            });
            document.body.removeChild(pageEl);
            return canvas;
        }

        async function exportAsPDF() {
            generatePreview();
            const source = document.getElementById('preview');

            // Match the PDF page width to however the report is actually rendered on
            // this device (letter-width on desktop, screen-width on phones — same as
            // the live preview already does via max-width: 100%). A fixed 8.5in page
            // is wider than most phone screens, so viewers show it at actual size and
            // require horizontal scrolling — this keeps everything visible at a glance.
            const widthPx = source.getBoundingClientRect().width;
            const pageWidthIn = widthPx / 96;

            const imageBatches = [];
            for (let i = 0; i < uploadedImages.length; i += IMAGES_PER_PDF_PAGE) {
                imageBatches.push(uploadedImages.slice(i, i + IMAGES_PER_PDF_PAGE));
            }

            try {
                const { jsPDF } = window.jspdf;

                // Page 1: title, report text, and the first batch of photos.
                const firstPage = makePdfPageShell(widthPx);
                firstPage.innerHTML = `
                    <h2 style="margin-top:0; text-align:center; font-size:22pt; font-weight:bold;">${previewTitle.textContent}</h2>
                    <div style="text-align:center; font-size:14pt; font-weight:bold; margin-top:2px;">Dave's Report</div>
                    <div style="text-align:center; font-size:8pt; font-weight:normal; color:#666; margin-top:2px;">Generated by Dave's Mobile App</div>
                    <h3 style="text-align:center; margin-top:5px;">${previewSubtitle.textContent}</h3>
                    <div style="margin-top:20px; white-space: pre-wrap;">${previewText.innerHTML}</div>
                `;
                const firstBatch = imageBatches[0] || [];
                const firstImagesRow = buildImagesRow(firstBatch);
                firstImagesRow.style.marginTop = '25px';
                if (firstBatch.length === 0) {
                    firstImagesRow.innerHTML = '<p style="color:#999;">Add photos above to see them here</p>';
                }
                firstPage.appendChild(firstImagesRow);

                const canvas1 = await renderPageToCanvas(firstPage);
                const height1In = (canvas1.height / canvas1.width) * pageWidthIn;
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'in',
                    format: [pageWidthIn, height1In]
                });
                pdf.addImage(canvas1.toDataURL('image/jpeg', 0.98), 'JPEG', 0, 0, pageWidthIn, height1In);

                // Additional pages: remaining photos, 2 per page.
                for (let b = 1; b < imageBatches.length; b++) {
                    const pageEl = makePdfPageShell(widthPx);
                    pageEl.appendChild(buildImagesRow(imageBatches[b]));
                    const canvas = await renderPageToCanvas(pageEl);
                    const heightIn = (canvas.height / canvas.width) * pageWidthIn;
                    pdf.addPage([pageWidthIn, heightIn]);
                    pdf.addImage(canvas.toDataURL('image/jpeg', 0.98), 'JPEG', 0, 0, pageWidthIn, heightIn);
                }

                pdf.save(`${getFileNameStamp()}.pdf`);
            } catch (err) {
                alert("PDF export failed. Use Print instead.");
            }
        }

        // Auto-date + empty report box
        window.onload = () => {
            const date = new Date();
            const formattedDate = new Intl.DateTimeFormat('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            }).format(date);

            document.getElementById('title').value = `Field Report - ${formattedDate}`;
            document.getElementById('report-text').value = ""; // Empty as requested
            document.title = getFileNameStamp();
            renderImages();
            generatePreview();
        };

        window.addEventListener('beforeprint', () => {
            document.title = getFileNameStamp();
        });
    </script>
</body>
</html>
